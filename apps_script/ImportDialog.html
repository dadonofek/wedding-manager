<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, 'Segoe UI', Arial, sans-serif; margin: 12px; color: #2b2b2b; }
    p { margin: 0 0 10px; line-height: 1.5; }
    textarea { width: 100%; height: 180px; box-sizing: border-box; direction: ltr;
               font-family: monospace; font-size: .85rem; border: 1px solid #ddd; border-radius: 8px; }
    button { padding: 10px 18px; border: 0; border-radius: 8px; background: #9c6b4a;
             color: #fff; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    button:disabled { opacity: .6; cursor: default; }
    #result { margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
    .ok { background: #e8f5e9; color: #256029; }
    .err { background: #fdecea; color: #a3251b; }
  </style>
</head>
<body>
  <p>הדביקו כאן את תוכן <code>sent_log.csv</code> שנוצר על ידי הסקריפט במחשב:</p>
  <textarea id="log" placeholder="id,phone,kind,sent_at&#10;ab12cd34ef,972501234567,invite,2026-07-04 18:32:11"></textarea>
  <button id="go" onclick="doImport()">ייבוא ועדכון סטטוסים</button>
  <div id="result"></div>

  <script>
    function doImport() {
      var text = document.getElementById('log').value.trim();
      if (!text) { show('err', 'ההדבקה ריקה'); return; }
      var btn = document.getElementById('go');
      btn.disabled = true; btn.textContent = 'מייבא...';
      google.script.run
        .withSuccessHandler(function (c) {
          show('ok', 'הזמנות שסומנו כנשלחו: ' + c.invites +
                     ' · תזכורות: ' + c.reminders +
                     ' · דולגו (כבר עודכנו): ' + c.skipped +
                     ' · מזהים לא מוכרים: ' + c.unknown);
          reset();
        })
        .withFailureHandler(function (e) {
          show('err', 'שגיאה: ' + (e && e.message ? e.message : e));
          reset();
        })
        .importSentLog(text);
    }
    function show(cls, text) {
      var r = document.getElementById('result');
      r.className = cls; r.textContent = text; r.style.display = 'block';
    }
    function reset() {
      var btn = document.getElementById('go');
      btn.disabled = false; btn.textContent = 'ייבוא ועדכון סטטוסים';
    }
  </script>
</body>
</html>
