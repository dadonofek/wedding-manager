<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, 'Segoe UI', Arial, sans-serif; margin: 12px; color: #2b2b2b; }
    p { margin: 0 0 10px; line-height: 1.5; }
    textarea { width: 100%; height: 180px; box-sizing: border-box; direction: ltr;
               font-family: monospace; font-size: .85rem; border: 1px solid #ddd; border-radius: 8px; }
    button { padding: 10px 18px; border: 0; border-radius: 8px; background: #9c6b4a;
             color: #fff; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    .hint { color: #8a8276; font-size: .85rem; }
  </style>
</head>
<body>
  <p>הקובץ מוכן. הורידו אותו והריצו במחשב:</p>
  <p class="hint" style="direction:ltr; text-align:left; font-family:monospace">
    wedding-sender invite --csv <?= filename ?>
  </p>
  <textarea id="csv" readonly><?= csv ?></textarea>
  <button onclick="download()">הורדת CSV ⬇</button>

  <script>
    var FILENAME = <?!= JSON.stringify(filename) ?>;

    function download() {
      var text = document.getElementById('csv').value;
      var blob = new Blob([text], { type: 'text/csv;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = FILENAME;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  </script>
</body>
</html>
