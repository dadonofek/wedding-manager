<!DOCTYPE html>
<!-- A WhatsApp-lookalike chat used ONLY to demo/screenshot what a guest sees
     when the invite arrives. The bubble text is injected by
     e2e/scripts/capture-media.mjs from the real invite template. -->
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp — הדמיה</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #efeae2; height: 100vh; display: flex; flex-direction: column;
    }
    /* subtle WhatsApp-style doodle backdrop */
    .chat {
      flex: 1; padding: 18px 12px 24px; overflow-y: auto;
      background-image: radial-gradient(#e4ddd0 1.2px, transparent 1.2px);
      background-size: 26px 26px;
      display: flex; flex-direction: column; gap: 10px;
    }
    header {
      background: #075e54; color: #fff; padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #cfd8dc;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .who { line-height: 1.25; }
    .who .name { font-weight: 600; }
    .who .status { font-size: .78rem; opacity: .85; }
    .day {
      align-self: center; background: #fff; color: #667; font-size: .74rem;
      padding: 4px 10px; border-radius: 8px; box-shadow: 0 1px 1px rgba(0,0,0,.08);
    }
    .bubble {
      align-self: flex-start;             /* outgoing, in RTL layout */
      background: #d9fdd3; max-width: 82%;
      padding: 8px 10px 6px; border-radius: 10px; border-top-right-radius: 2px;
      box-shadow: 0 1px 1px rgba(0,0,0,.10);
      white-space: pre-wrap; font-size: .95rem; line-height: 1.45;
      word-break: break-word;
    }
    .bubble a { color: #027eb5; text-decoration: underline; direction: ltr; unicode-bidi: embed; }
    .meta {
      display: flex; justify-content: flex-end; align-items: center; gap: 4px;
      margin-top: 3px; font-size: .68rem; color: #7b8a8f;
    }
    .ticks { color: #53bdeb; letter-spacing: -3px; font-size: .8rem; }
    footer {
      display: flex; gap: 8px; padding: 8px 10px; background: #f0f2f5;
    }
    footer .input {
      flex: 1; background: #fff; border-radius: 20px; padding: 9px 14px;
      color: #8896a0; font-size: .9rem;
    }
    footer .mic {
      width: 40px; height: 40px; border-radius: 50%; background: #00a884;
      color: #fff; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="avatar">👰🤵</div>
    <div class="who">
      <div class="name">משפחת ישראלי</div>
      <div class="status">מחובר/ת</div>
    </div>
  </header>

  <div class="chat">
    <div class="day">היום</div>
    <div class="bubble">
      <span id="message"></span>
      <div class="meta"><span>18:32</span><span class="ticks">✓✓</span></div>
    </div>
  </div>

  <footer>
    <div class="input">הודעה</div>
    <div class="mic">🎤</div>
  </footer>
</body>
</html>
